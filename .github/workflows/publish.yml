name: Publish to npm

on:
  push:
    branches:
      - master
    paths:
      - package.json

permissions:
  contents: read
  id-token: write

jobs:
  publish:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.33.0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Run tests
        run: pnpm test

      - name: Check if version already exists on npm
        id: npm-check
        run: |
          PKG_NAME=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).name")
          PKG_VERSION=$(node -p "JSON.parse(require('fs').readFileSync('package.json','utf8')).version")

          if npm view "$PKG_NAME@$PKG_VERSION" version > /dev/null 2>&1; then
            echo "published=true" >> "$GITHUB_OUTPUT"
            echo "$PKG_NAME@$PKG_VERSION is already published. Skipping publish."
          else
            echo "published=false" >> "$GITHUB_OUTPUT"
            echo "$PKG_NAME@$PKG_VERSION is not published yet."
          fi

      - name: Publish package
        if: steps.npm-check.outputs.published == 'false'
        run: pnpm publish --access public --no-git-checks --provenance
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
